<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Generator</title>
  <meta name="description" content="Test your knowledge across AI, ML, Statistics, SQL, and General Knowledge." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- App Container -->
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">🧠 QuizGen</h1>
      <p class="tagline">Sharpen your mind. One question at a time.</p>
    </header>
    <!-- Landing / Category Screen -->
    <section id="landing" class="screen active">
      <h2 class="screen-title">Pick a Category</h2>
      <div class="category-grid" id="categoryGrid">
        <!-- Cards injected via JS -->
      </div>
      <!-- High Scores -->
      <div class="highscores">
        <h3>🏆 High Scores</h3>
        <ul id="highscoresList"><li class="empty">No scores yet — be the first!</li></ul>
      </div>
    </section>
    <!-- Quiz Screen -->
    <section id="quiz" class="screen">
      <div class="quiz-topbar">
        <span id="categoryLabel" class="badge"></span>
        <span id="questionCounter" class="counter">1 / 20</span>
        <span id="timer" class="timer">30s</span>
      </div>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="question-card">
        <h2 id="questionText" class="question-text"></h2>
        <div id="options" class="options"></div>
      </div>
      <div class="quiz-actions">
        <button id="nextBtn" class="btn btn-primary" disabled>Next →</button>
      </div>
    </section>
    <!-- Results Screen -->
    <section id="results" class="screen">
      <div class="result-card">
        <h2>Quiz Complete! 🎉</h2>
        <p class="score-line">You scored <span id="finalScore">0</span> / <span id="totalScore">0</span></p>
        <p id="scoreMessage" class="score-message"></p>
        <div class="result-actions">
          <button id="restartBtn" class="btn btn-primary">Restart Quiz</button>
          <button id="changeCategoryBtn" class="btn btn-ghost">Change Category</button>
        </div>
      </div>
      <h3 class="review-title">Review Answers</h3>
      <div id="review" class="review"></div>
    </section>
    <footer class="footer">Made with ❤️ — Pure HTML, CSS &amp; JavaScript</footer>
  </div>
  <script src="./script.js"></script>
</body>
</html>
